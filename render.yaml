# Render.com blueprint — deploy with one click from a Git repo containing this folder.
# In Render: New + → Blueprint → connect the repo → it reads this file.
services:
  - type: web
    name: minutelead-render
    runtime: docker
    rootDir: .
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    autoDeploy: true
